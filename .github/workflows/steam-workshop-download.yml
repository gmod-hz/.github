name: Steam Workshop Download

on:
  workflow_call:
    inputs:
      workshop-id:
        required: true
        type: string

jobs:
  steam-workshop-download:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Check Steam Workshop item updates
        run: |
          curl -X POST https://api.steampowered.com/ISteamRemoteStorage/GetPublishedFileDetails/v1/ \
            -H "Content-Type: application/x-www-form-urlencoded" \
            -d "itemcount=1" \
            -d "publishedfileids[0]=${{ inputs.workshop-id }}" \
            | jq '.response.publishedfiledetails[0].time_updated'
      - name: Install SteamCMD
        uses: andriivitiv/setup-steamcmd@v1.3.0
      - name: Install fastgmad
        uses: gmod-hz/setup-fastgmad@main
      - name: Download Steam Workshop item
        id: download
        run: |
          steamcmd +login anonymous +workshop_download_item 4000 ${{ inputs.workshop-id }} +quit
          PATH_ADDON_GMA=$(find ~/Steam/steamapps/workshop/content/4000/${{ inputs.workshop-id }} -name "*.gma" | head -n 1)
          PATH_ADDON_BIN=$(find ~/Steam/steamapps/workshop/content/4000/${{ inputs.workshop-id }} -name "*.bin" | head -n 1)
          echo "PATH_ADDON_GMA=$PATH_ADDON_GMA" >> $GITHUB_OUTPUT
          echo "PATH_ADDON_BIN=$PATH_ADDON_BIN" >> $GITHUB_OUTPUT
      - name: Extract GMA
        if: steps.download.outputs.PATH_ADDON_GMA
        run: |
          fastgmad extract -file ${{ steps.download.outputs.PATH_ADDON_GMA }} -out ${{ runner.temp }}/addon
      - name: Extract BIN
        if: steps.download.outputs.PATH_ADDON_BIN
        continue-on-error: true
        run: |
          7z x ${{ steps.download.outputs.PATH_ADDON_BIN }} -so > addon.gma
          fastgmad extract -file addon.gma -out ${{ runner.temp }}/addon
      - name: Checkout repository
        uses: actions/checkout@v7.0.0
      - name: Configure Git
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "41898282+github-actions[bot]@users.noreply.github.com"
      - name: Commit and push
        run: |
          cp -a ${{ runner.temp }}/addon/. ./
          git add -N .
          
          # Wrap for making errors non-halting
          #  Using `continue-on-error: true` not working properly
          set +e
            git diff --quiet; DIFF=$?
          set -e
          echo $DIFF
          if [ $DIFF -eq 1 ]; then
            git add -A
            git commit -m "Updated from Steam Workshop"
            git push origin main
          fi
